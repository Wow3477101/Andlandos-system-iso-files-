<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background-color: #0a0a0c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
    }
  </style>
</head>
<body>

<canvas id="andlandScreen" width="800" height="600" style="border:none !important; background-color:#0f0f12;"></canvas>

<script>
  const canvas = document.getElementById('andlandScreen');
  const ctx = canvas.getContext('2d');
  
  // Test draw to see if it renders
  ctx.fillStyle = "#0f0f12";
  ctx.fillRect(0, 0, 800, 600);
  ctx.fillStyle = "#39ff14";
  ctx.font = "30px monospace";
  ctx.fillText("ANDLAND OS v1.3 - TEST MODE", 100, 300);
</script>
</body>
</html>

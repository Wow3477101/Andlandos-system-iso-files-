<style>
  body {
    margin: 0;
    background-color: #0a0a0c;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: monospace;
  }
  canvas {
    background-color: #0f0f12;
    border: 4px solid #333;
    border-radius: 8px;
    box-shadow: 0 0 25px rgba(0, 122, 255, 0.4);
  }
</style>

<canvas id="andlandScreen" width="800" height="600"></canvas>

<script>
  const canvas = document.getElementById('andlandScreen');
  const ctx = canvas.getContext('2d');

  const defaultAccounts = [
      { user: "User", pass: "1234", theme: "#007aff" }, 
      { user: "Guest", pass: "", theme: "#ff453a" }    
  ];
  
  let accountsList = JSON.parse(localStorage.getItem('andland_accounts')) || defaultAccounts;
  let selectedAccountIdx = parseInt(localStorage.getItem('andland_active_idx')) || 0;
  
  let currentUsername = accountsList[selectedAccountIdx].user;
  let currentPassword = accountsList[selectedAccountIdx].pass;
  let currentThemeColor = accountsList[selectedAccountIdx].theme || "#007aff"; 
  let currentPhase = "Booting"; 
  let bootStep = 0, isSystemOn = true, typedPassword = "", loginError = false;
  let addingNewAccount = false, inputBuffer = "", tempNewPass = "", regStep = 0, shutdownLineCount = 0;

  const bootLogs = ["[ OK ] Loading AndlandOS Bios...", "[ OK ] Mounting Root...", "[ OK ] Loading Security...", "KERNEL READY."];
  const themes = [{ name: "Blue", color: "#007aff" }, { name: "Red", color: "#ff453a" }];

  function drawText(text, size, color, x, y, bold) {
      ctx.fillStyle = color;
      ctx.font = (bold ? "bold " : "") + size + "px monospace";
      ctx.fillText(text, x, y);
  }

  function render() {
      if (!isSystemOn) { ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 600); return; }
      ctx.fillStyle = "#0f0f12"; ctx.fillRect(0, 0, 800, 600);

      if (currentPhase === "Booting") {
          bootLogs.forEach((log, i) => { if(i <= bootStep) drawText(log, 15, "#39ff14", 50, 100 + (i * 35), false); });
      } else if (currentPhase === "Locked") {
          ctx.fillStyle = "#232328"; ctx.fillRect(120, 40, 560, 520);
          drawText("ANDLAND OS", 28, currentThemeColor, 310, 90, true);
          drawText(`User: ${currentUsername}`, 14, "#fff", 200, 130, false);
      } else {
          ctx.fillStyle = "#232328"; ctx.fillRect(0, 0, 800, 40);
          drawText(`AndlandOS [${currentUsername}]`, 14, currentThemeColor, 20, 25, true);
          ctx.fillStyle = "#232328"; ctx.fillRect(10, 60, 160, 520);
          drawText("[D] Desktop", 14, "#fff", 25, 130, false);
      }
  }

  setInterval(() => { if(bootStep < bootLogs.length-1) { bootStep++; render(); } else if(currentPhase === "Booting") { currentPhase = "Locked"; render(); } }, 600);
  render();
</script>

<div style="text-align: center; margin-top: 20px;">
  <canvas id="aosScreen" width="800" height="600" style="background-color: #0d0d11; border: 4px solid #333; border-radius: 8px; box-shadow: 0 0 25px rgba(0, 122, 255, 0.4);"></canvas>
</div>

<style> body { background-color: #0a0a0c; margin: 0; padding: 0; } </style>

<script>
window.onload = function() {
  const canvas = document.getElementById('aosScreen');
  const ctx = canvas.getContext('2d');

  // --- PERSISTENT DATA ---
  let username = localStorage.getItem("aos_user") || "User";
  let password = localStorage.getItem("aos_pwd") || "1234";
  let themeColor = localStorage.getItem("aos_theme") || "#007aff";

  const VERSION = "v1.3-SafeAndSound";
  let currentPhase = "Booting"; 
  let bootStep = 0;
  let typedPassword = "";
  let loginError = false;
  let isEditing = null; // 'user' or 'pass'
  let inputBuffer = "";

  const bootLogs = ["[ OK ] Initializing Secure Kernel...", "[ OK ] Mounting User Persistence...", "[ OK ] Loading Safe and Sound Patch...", "ANDLAND OS v1.3 LOADED."];

  function drawText(text, size, color, x, y, bold) {
      ctx.fillStyle = color;
      ctx.font = (bold ? "bold " : "") + size + "px monospace";
      ctx.fillText(text, x, y);
  }

  function render() {
      ctx.fillStyle = "#0d0d11"; ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (currentPhase === "Booting") {
          for (let i = 0; i <= bootStep; i++) drawText(bootLogs[i], 15, "#39ff14", 50, 100 + (i * 35), false);
          return;
      }

      if (currentPhase === "Locked") {
          drawText("ANDLAND OS - LOGIN", 30, themeColor, 260, 180, true);
          drawText("Enter Password for " + username, 14, "#a0a0a5", 280, 230, false);
          ctx.strokeStyle = loginError ? "#ff453a" : themeColor;
          ctx.strokeRect(250, 270, 300, 45);
          drawText("*".repeat(typedPassword.length), 24, "#ffffff", 270, 303, false);
          return;
      }

      // Sidebar
      ctx.fillStyle = "#1c1c22"; ctx.fillRect(0, 0, canvas.width, 40);
      drawText("Andland OS", 14, themeColor, 20, 25, true);
      drawText(VERSION, 12, "#ffcc00", 125, 25, false);

      // --- SETTINGS (The v1.3 Safe and Sound update) ---
      if (currentPhase === "Settings") {
          ctx.fillStyle = "#15151a"; ctx.fillRect(190, 60, 590, 520);
          drawText("CONTROL PANEL - USER SETTINGS", 18, "#ffffff", 210, 90, true);
          
          drawText("Current User: " + username + "  [U] Change", 16, "#f0f0f5", 220, 150);
          drawText("Current Pass: " + "*".repeat(password.length) + "  [P] Change", 16, "#f0f0f5", 220, 190);
          
          if(isEditing) {
              drawText("Editing " + isEditing + ": " + inputBuffer + "_", 18, themeColor, 220, 250, true);
              drawText("Press ENTER to save", 12, "#707075", 220, 280);
          }
          drawText("[D] Back to Desktop", 12, "#a0a0a5", 210, 560);
      } else {
          // Standard Desktop/Terminal/Files (Simplified for brevity)
          drawText("Welcome, " + username, 24, "#ffffff", 220, 80, true);
          drawText("Press [2] for Settings", 14, themeColor, 220, 120);
      }
  }

  window.addEventListener('keydown', function(e) {
      if (currentPhase === "Locked") {
          if (e.key === "Enter") {
              if (typedPassword === password) { currentPhase = "Desktop"; } else { loginError = true; typedPassword = ""; }
          } else if (e.key === "Backspace") typedPassword = typedPassword.slice(0,-1);
          else if (e.key.length === 1) typedPassword += e.key;
      } else if (currentPhase === "Settings" && isEditing) {
          if (e.key === "Enter") {
              if (isEditing === 'user') { username = inputBuffer; localStorage.setItem("aos_user", username); }
              else { password = inputBuffer; localStorage.setItem("aos_pwd", password); }
              isEditing = null; inputBuffer = "";
          } else if (e.key === "Backspace") inputBuffer = inputBuffer.slice(0,-1);
          else if (e.key.length === 1) inputBuffer += e.key;
      } else {
          if (e.key === '2') currentPhase = "Settings";
          if (e.key === 'D') currentPhase = "Desktop";
          if (e.key === 'u' && currentPhase === "Settings") isEditing = 'user';
          if (e.key === 'p' && currentPhase === "Settings") isEditing = 'pass';
      }
      render();
  });

  const bootTimer = setInterval(() => {
      if (bootStep < bootLogs.length - 1) { bootStep++; render(); }
      else { clearInterval(bootTimer); currentPhase = "Locked"; render(); }
  }, 600);
};
</script>

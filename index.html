<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AOS v1.1 Unstable</title>
  <style>
    body {
      margin: 0;
      background-color: #0a0a0c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      background-color: #0f0f12;
      border: 4px solid #333;
      border-radius: 8px;
      box-shadow: 0 0 25px rgba(0, 122, 255, 0.4);
    }
  </style>
</head>
<body>

  <canvas id="aosScreen" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById('aosScreen');
    const ctx = canvas.getContext('2d');

    const VERSION = "v1.1-dev-unstable";
    let currentPhase = "Booting"; 
    let bootStep = 0;
    let isSystemOn = true;
    let typedPassword = "";
    const correctPassword = "1234";
    let loginError = false;

    const bootLogs = [
        "[ OK ] Loading AOS Bios Subsystems...",
        "[ OK ] Mounting Virtual Root Directories...",
        "[ OK ] Initializing Security Firewalls...",
        "[WARN] Kernel state: UNSTABLE DEVELOPMENT BUILD",
        "AOS SECURE KERNEL LOADED CORE COMPONENT."
    ];

    const icons = [
        { name: "Console",  x: 220, y: 120, w: 80, h: 80, color: "#39ff14", app: "Terminal" },
        { name: "Settings", x: 340, y: 120, w: 80, h: 80, color: "#007aff", app: "Settings" },
        { name: "Files",    x: 460, y: 120, w: 80, h: 80, color: "#ffcc00", app: "Files" },
        { name: "Power Off",x: 580, y: 120, w: 80, h: 80, color: "#ff453a", app: "Shutdown" }
    ];

    function drawText(text, size, color, x, y, bold) {
        ctx.fillStyle = color;
        ctx.font = (bold ? "bold " : "") + size + "px monospace";
        ctx.fillText(text, x, y);
    }

    function render() {
        if (!isSystemOn) {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            return;
        }

        ctx.fillStyle = "#0d0d11";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (currentPhase === "Booting") {
            for (let i = 0; i <= bootStep; i++) {
                let color = "#39ff14";
                if (bootLogs[i].includes("[WARN]")) color = "#ffcc00"; 
                drawText(bootLogs[i], 15, color, 50, 100 + (i * 35), false);
            }
            ctx.fillStyle = "#007aff";
            ctx.fillRect(50, 480, (bootStep + 1) * 130, 15);
            return;
        }

        if (currentPhase === "Locked") {
            ctx.fillStyle = "#1c1c22";
            ctx.fillRect(150, 130, 500, 340);
            drawText("AOS SECURE LOCK", 30, "#007aff", 260, 180, true);
            drawText("Enter User Password to decrypt desktop:", 14, "#a0a0a5", 230, 230, false);
            
            ctx.fillStyle = "#000000";
            ctx.fillRect(250, 270, 300, 45);
            ctx.strokeStyle = loginError ? "#ff453a" : "#007aff";
            ctx.lineWidth = 2;
            ctx.strokeRect(250, 270, 300, 45);
            
            let stars = "";
            for(let i=0; i<typedPassword.length; i++) { stars += "*"; }
            drawText(stars, 24, "#ffffff", 270, 303, false);
            
            if (loginError) {
                drawText("INCORRECT PASSWORD - TRY AGAIN", 12, "#ff453a", 295, 345, true);
            } else {
                drawText("Type password on keyboard & press ENTER", 12, "#707075", 255, 345, false);
            }
            return;
        }

        // Top Taskbar
        ctx.fillStyle = "#1c1c22";
        ctx.fillRect(0, 0, canvas.width, 40);
        drawText("AOS Engine", 14, "#007aff", 20, 25, true);
        drawText(VERSION, 12, "#ffcc00", 120, 25, false);
        drawText("SYSTEM OK", 14, "#39ff14", 680, 25, false);

        // Sidebar Panel
        ctx.fillStyle = "#1c1c22";
        ctx.fillRect(10, 60, 160, 520);
        drawText("CORE SYSTEM", 12, "#a0a0a5", 25, 90, true);
        drawText("[D] Desktop", 14, "#f0f0f5", 25, 130, false);
        drawText("[1] Terminal", 14, "#39ff14", 25, 170, false);
        drawText("[2] Settings", 14, "#007aff", 25, 210, false);
        drawText("[3] Files", 14, "#ffcc00", 25, 250, false);
        
        ctx.fillStyle = "#ff453a";
        ctx.fillRect(20, 520, 140, 35);
        drawText("SHUTDOWN", 12, "#ffffff", 50, 542, true);

        if (currentPhase === "Desktop") {
            drawText("Welcome Back, Alex", 24, "#f0f0f5", 220, 80, true);
            drawText("Kernel Mode: Unstable Developer Environment", 14, "#707075", 220, 105, false);
            
            icons.forEach(function(icon) {
                ctx.fillStyle = "#1c1c22";
                ctx.fillRect(icon.x, icon.y, icon.w, icon.h);
                ctx.fillStyle = icon.color;
                ctx.fillRect(icon.x, icon.y + 70, icon.w, 10);
                drawText(icon.name, 12, "#f0f0f5", icon.x + 5, icon.y + 40, false);
            });
        } 
        else if (currentPhase === "Terminal") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(190, 60, 590, 520);
            ctx.fillStyle = "#34343d";
            ctx.fillRect(190, 60, 590, 30);
            drawText("AOS Shell Terminal", 14, "#39ff14", 205, 80, true);
            drawText("aos_user@andland_vm:~$ neofetch", 14, "#39ff14", 205, 120, false);
            drawText("OS: Alex OS " + VERSION, 14, "#f0f0f5", 205, 150, false);
            drawText("Host: GitHub Live Web Core Container", 14, "#f0f0f5", 205, 170, false);
            drawText("Memory: 1024MB allocated virtual limits", 14, "#f0f0f5", 205, 190, false);
            drawText("Press 'D' to return to desktop.", 12, "#a0a0a5", 205, 560, false);
        } 
        else if (currentPhase === "Settings") {
            ctx.fillStyle = "#15151a";
            ctx.fillRect(190, 60, 590, 520);
            ctx.fillStyle = "#1c1c22";
            ctx.fillRect(190, 60, 590, 45);
            drawText("Control Panel Settings", 18, "#ffffff", 210, 88, true);
            
            ctx.fillStyle = "#1c1c22";
            ctx.fillRect(210, 130, 550, 105);
            drawText("BUILD SPECIFICATIONS", 12, "#ffcc00", 225, 150, true);
            drawText("AOS Code Branch: " + VERSION, 14, "#f0f0f5", 225, 175, false);
            drawText("Channel: Unstable / Experimental Sandbox", 14, "#a0a0a5", 225, 195, false);
            drawText("Security Lock Phrase: [ 1234 ]", 14, "#39ff14", 225, 215, false);

            ctx.fillStyle = "#1c1c22";
            ctx.fillRect(210, 255, 550, 105);
            drawText("VIRTUAL ENV VARIABLES", 12, "#007aff", 225, 275, true);
            drawText("Display Target: GitHub Pages Host Layer", 14, "#f0f0f5", 225, 300, false);
            drawText("Input Layer: Keyboard Interceptor Enabled", 14, "#f0f0f5", 225, 320, false);
            drawText("Root Access Level: DECRYPTED/FULL SYSTEM", 14, "#39ff14", 225, 340, false);
            
            drawText("Press 'D' to back out to apps grid panel.", 12, "#a0a0a5", 210, 560, false);
        }
        else if (currentPhase === "Files") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(190, 60, 590, 520);
            ctx.fillStyle = "#ffcc00";
            ctx.fillRect(190, 60, 590, 30);
            drawText("File Manager - Root Browser", 14, "#000000", 205, 80, true);
            drawText("Directory: /root/desktop/", 14, "#a0a0a5", 205, 120, false);
            drawText("[DIR]  system_apps/", 14, "#ffcc00", 220, 150, false);
            drawText("[DIR]  developer_logs/", 14, "#ffcc00", 220, 175, false);
            drawText("[FILE] aos_config.cfg", 14, "#ffffff", 220, 200, false);
            drawText("Press 'D' to drop out to desktop.", 12, "#a0a0a5", 205, 560, false);
        }
        else if (currentPhase === "Shutdown") {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawText("Shutting down AOS safely...", 20, "#ff453a", 270, 260, true);
            setTimeout(function() {
                isSystemOn = false;
                render();
            }, 2000);
        }
    }

    const bootTimer = setInterval(function() {
        if (bootStep < bootLogs.length - 1) {
            bootStep++;
            render();
        } else {
            clearInterval(bootTimer);
            currentPhase = "Locked"; 
            render();
        }
    }, 700);

    window.addEventListener('keydown', function(e) {
        if (!isSystemOn) return;
        if (currentPhase === "Locked") {
            loginError = false; 
            if (e.key >= "0" && e.key <= "9") {
                if (typedPassword.length < 6) typedPassword += e.key;
            } 
            else if (e.key === "Backspace") {
                typedPassword = typedPassword.slice(0, -1);
            } 
            else if (e.key === "Enter") {
                if (typedPassword === correctPassword) {
                    currentPhase = "Desktop"; 
                    typedPassword = "";
                } else {
                    typedPassword = "";
                    loginError = true;
                }
            }
            render();
            return;
        }
        const key = e.key.toUpperCase();
        if (key === '1') currentPhase = "Terminal";
        if (key === '2') currentPhase = "Settings";
        if (key === '3') currentPhase = "Files";
        if (key === 'D') currentPhase = "Desktop";
        render();
    });

    canvas.addEventListener('click', function(e) {
        if (currentPhase === "Booting" || currentPhase === "Locked" || !isSystemOn) return;
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (mouseX >= 20 && mouseX <= 160 && mouseY >= 520 && mouseY <= 555) {
            currentPhase = "Shutdown";
            render();
            return;
        }

        if (currentPhase === "Desktop") {
            icons.forEach(function(icon) {
                if (mouseX >= icon.x && mouseX <= (icon.x + icon.w) &&
                    mouseY >= icon.y && mouseY <= (icon.y + icon.h)) {
                    currentPhase = icon.app;
                    render();
                }
            });
        }
    });

    render();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andland OS v1.2-stable Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #terminal-header { margin-bottom: 12px; text-align: center; }
        #terminal-header h1 { font-size: 20px; color: #39ff14; letter-spacing: 2px; text-shadow: 0 0 8px rgba(57, 255, 20, 0.5); }
        canvas {
            background-color: #0d0d11;
            border: 2px solid #1c1c22;
            border-radius: 8px;
            display: block;
            cursor: pointer;
            transition: box-shadow 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="terminal-header">
        <h1>ANDLAND OPERATING SYSTEM</h1>
    </div>
    <canvas id="andlandScreen" width="800" height="600"></canvas>

    <script>

            localStorage.setItem("and_user_v12", username);
            localStorage.setItem("and_pwd_v12", correctPassword);
        }

            ctx.fillStyle = color;
            ctx.font = (bold ? "bold " : "") + size + "px monospace";
            ctx.fillText(text, x, y);
        }

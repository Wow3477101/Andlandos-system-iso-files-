<style>
  body { 
    margin: 0; 
    background-color: #0a0a0c; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    font-family: monospace;
    cursor: default; /* Set back to standard system cursor */
  }
  canvas { 
    background-color: #0f0f12; 
    border: 4px solid #007aff; 
    border-radius: 8px; 
    box-shadow: 0 0 25px rgba(0, 122, 255, 0.4); 
  }
</style>

<canvas id="andlandScreen" width="800" height="600"></canvas>

<script>
  const canvas = document.getElementById('andlandScreen');
  const ctx = canvas.getContext('2d');

  // --- HELPER: WINDOW BORDER ---
  function drawWindowBorder(x, y, w, h) {
      ctx.strokeStyle = "#007aff"; 
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);
  }

  // --- DRAW TEXT HELPER ---
  function drawText(text, size, color, x, y, bold) {
      ctx.fillStyle = color;
      ctx.font = (bold ? "bold " : "") + size + "px monospace";
      ctx.fillText(text, x, y);
  }

  // --- CORE RENDER FUNCTION ---
  function render() {
      // Clear screen
      ctx.fillStyle = "#0f0f12";
      ctx.fillRect(0, 0, 800, 600);

      // Example: Drawing a window with a border
      // Terminal Window
      ctx.fillStyle = "#1e1e24";
      ctx.fillRect(190, 60, 590, 520);
      drawWindowBorder(190, 60, 590, 520);
      drawText("AndlandOS v1.3 - Console", 16, "#ffffff", 200, 90, true);

      // Sidebar
      ctx.fillStyle = "#232328";
      ctx.fillRect(10, 60, 160, 520);
      drawWindowBorder(10, 60, 160, 520);
      drawText("NAVIGATION", 12, "#a0a0a5", 25, 90, true);
  }

  render();
</script>

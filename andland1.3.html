<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andland OS v1.3-stable</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #terminal-header { margin-bottom: 12px; text-align: center; }
        #terminal-header h1 { font-size: 20px; color: #55aaff; letter-spacing: 2px; }
        canvas {
            background-color: #0d0d11;
            border: 2px solid #1c1c22;
            border-radius: 8px;
            display: block;
            cursor: pointer;
            transition: box-shadow 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="terminal-header">
        <h1>ANDLAND OPERATING SYSTEM</h1>
    </div>

    <canvas id="andlandScreen" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('andlandScreen');
        const ctx = canvas.getContext('2d');

        // CRITICAL V1.3 DEFINITION
        const VERSION = "v1.3-stable";
        let currentPhase = "Booting"; 
        let bootStep = 0;
        let isSystemOn = true;
        let typedPassword = "";
        let loginError = false;

        // --- WALLPAPER ENGINE STATES ---
        let wallpaperMode = localStorage.getItem("and_wp_mode") || "matrix";
        let wallpaperURL = localStorage.getItem("and_wp_url") || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop"; 
        let bgImage = new Image();
        bgImage.src = wallpaperURL;
        let isChangingWallpaperURL = false;

        let username = localStorage.getItem("and_user") || "User";
        let correctPassword = localStorage.getItem("and_pwd") || "1234";
        let themeColor = localStorage.getItem("and_theme") || "#007aff";

        let isGameInstalled = localStorage.getItem("and_installed") === "true";
        let andCoins = parseFloat(localStorage.getItem("and_coins")) || 0;
        let clickPower = parseFloat(localStorage.getItem("and_power")) || 0.25;
        let upgradeCost = parseFloat(localStorage.getItem("and_cost")) || 10.0;

        let isChangingPassword = false;
        let isChangingName = false;
        let inputBuffer = "";
        let termInput = "";
        let termLogs = ["Andland Core loaded. Type 'help' for shell execution.", ""];

        const bootLogs = [
            "[ OK ] Loading Andland Bios Subsystems...",
            "[ OK ] Mounting Virtual Root Directories...",
            "[ OK ] Pulling local storage manifest data...",
            "[WARN] Kernel state: BUILD v1.3-stable",
            "ANDLAND OS SECURE KERNEL COMPILING COMPLETE."
        ];

        let icons = [
            { name: "Console",   x: 220, y: 120, w: 80, h: 80, color: "#39ff14", app: "Terminal" },
            { name: "Settings",  x: 340, y: 120, w: 80, h: 80, color: "#007aff", app: "Settings" },
            { name: "Files",     x: 460, y: 120, w: 80, h: 80, color: "#ffcc00", app: "Files" },
            { name: "AndStore",  x: 580, y: 120, w: 80, h: 80, color: "#ac39ff", app: "AndStore" },
            { name: "Recovery",  x: 220, y: 240, w: 80, h: 80, color: "#ff9500", app: "Recovery" },
            { name: "Lock Screen",x: 340, y: 240, w: 80, h: 80, color: "#e0e0e5", app: "LockToggle" },
            { name: "Power Off", x: 460, y: 240, w: 80, h: 80, color: "#707075", app: "Shutdown" }
        ];

        if (isGameInstalled && !icons.some(i => i.app === "Miner")) {
            icons.push({ name: "CoinMiner", x: 220, y: 360, w: 80, h: 80, color: "#00ffcc", app: "Miner" });
        }

        function saveSystemState() {
            localStorage.setItem("and_user", username);
            localStorage.setItem("and_pwd", correctPassword);
            localStorage.setItem("and_theme", themeColor);
            localStorage.setItem("and_installed", isGameInstalled);
            localStorage.setItem("and_coins", andCoins);
            localStorage.setItem("and_power", clickPower);
            localStorage.setItem("and_cost", upgradeCost);
            localStorage.setItem("and_wp_mode", wallpaperMode);
            localStorage.setItem("and_wp_url", wallpaperURL);
        }

        function drawText(text, size, color, x, y, bold) {
            ctx.fillStyle = color;
            ctx.font = (bold ? "bold " : "") + size + "px monospace";
            ctx.fillText(text, x, y);
        }

        function drawMatrixWallpaper() {
            ctx.fillStyle = "#0c0c12"; ctx.fillRect(190, 40, 610, 560);
            ctx.strokeStyle = "rgba(0, 122, 255, 0.05)"; ctx.lineWidth = 1;
            for (let x = 190; x < canvas.width; x += 30) {
                ctx.beginPath(); ctx.moveTo(x, 40); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 40; y < canvas.height; y += 30) {
                ctx.beginPath(); ctx.moveTo(190, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        function render() {
            if (!isSystemOn) {
                ctx.fillStyle = "#000000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                return;
            }

            ctx.fillStyle = "#0d0d11"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            canvas.style.boxShadow = "0 0 25px " + themeColor;

            if (currentPhase === "Booting") {
                for (let i = 0; i <= bootStep; i++) {
                    let color = "#39ff14";
                    if (bootLogs[i].includes("[WARN]")) color = "#ffcc00"; 
                    drawText(bootLogs[i], 15, color, 50, 100 + (i * 35), false);
                }
                ctx.fillStyle = themeColor; ctx.fillRect(50, 480, (bootStep + 1) * 130, 15);
                return;
            }

            if (currentPhase === "Locked") {
                ctx.fillStyle = "#1c1c22"; ctx.fillRect(150, 120, 500, 360);
                drawText("WELCOME TO " + VERSION, 24, themeColor, 210, 175, true);
                ctx.fillStyle = "#000000"; ctx.fillRect(250, 260, 300, 45);
                ctx.strokeStyle = loginError ? "#ff453a" : themeColor; ctx.strokeRect(250, 260, 300, 45);
                let stars = ""; for(let i=0; i<typedPassword.length; i++) { stars += "*"; }
                drawText(stars, 24, "#ffffff", 270, 293, false);
                return;
            }

            if (currentPhase === "Desktop") {
                if (wallpaperMode === "image" && bgImage.complete) {
                    ctx.drawImage(bgImage, 190, 40, 610, 560);
                } else {
                    drawMatrixWallpaper();
                }
            }

            // Framework Panels
            ctx.fillStyle = "#1c1c22"; ctx.fillRect(0, 0, canvas.width, 40);
            drawText("Andland OS", 14, themeColor, 20, 25, true);
            drawText(VERSION, 12, "#ffcc00", 140, 25, false);

            ctx.fillStyle = "#1c1c22"; ctx.fillRect(10, 60, 160, 520);
            drawText("[D] Desktop", 14, "#f0f0f5", 25, 130, false);
            drawText("[1] Terminal", 14, "#39ff14", 25, 160, false);
            drawText("[2] Settings", 14, themeColor, 25, 190, false);

            if (currentPhase === "Desktop") {
                drawText("Welcome Back, " + username, 24, "#f0f0f5", 220, 80, true);
                icons.forEach(function(icon) {
                    ctx.fillStyle = "rgba(28, 28, 34, 0.85)"; ctx.fillRect(icon.x, icon.y, icon.w, icon.h);
                    ctx.fillStyle = icon.app === "Settings" ? themeColor : icon.color;
                    ctx.fillRect(icon.x, icon.y + 70, icon.w, 10);
                    drawText(icon.name, 11, "#f0f0f5", icon.x + 4, icon.y + 40, false);
                });
            }
            else if (currentPhase === "Settings") {
                ctx.fillStyle = "#15151a"; ctx.fillRect(190, 60, 590, 520);
                drawText("Control Panel Customization", 18, "#ffffff", 210, 88, true);
                
                ctx.fillStyle = "#1c1c22"; ctx.fillRect(210, 240, 550, 160);
                drawText("WALLPAPER ARCHITECTURE ENGINE", 12, "#ac39ff", 225, 265, true);
                
                ctx.fillStyle = (wallpaperMode === "matrix") ? themeColor : "#44444a";
                ctx.fillRect(225, 290, 140, 30); drawText("[A] MATRIX", 11, "#ffffff", 255, 309, true);

                ctx.fillStyle = (wallpaperMode === "image") ? themeColor : "#44444a";
                ctx.fillRect(380, 290, 140, 30); drawText("[B] IMAGE LINK", 11, "#ffffff", 400, 309, true);

                ctx.fillStyle = "#000000"; ctx.fillRect(225, 340, 520, 30);
                ctx.strokeStyle = isChangingWallpaperURL ? "#39ff14" : "#44444a"; ctx.strokeRect(225, 340, 520, 30);
                let pURL = wallpaperURL; if (pURL.length > 55) pURL = pURL.substring(0, 52) + "...";
                drawText(isChangingWallpaperURL ? inputBuffer + "_" : "URL: " + pURL, 11, "#39ff14", 235, 359, false);
            }
            else if (currentPhase === "Terminal") {
                ctx.fillStyle = "#000000"; ctx.fillRect(190, 60, 590, 520);
                drawText("Andland Shell Executable", 14, "#39ff14", 205, 80, true);
                termLogs.slice(-15).forEach((log, index) => {
                    drawText(log, 14, "#39ff14", 205, 120 + (index * 22), false);
                });
                drawText(username.toLowerCase() + "@andland:~$ " + termInput + "_", 14, "#ffffff", 205, 520, false);
            }
        }

        function executeTerminalCommand(cmd) {
            let clearCmd = cmd.trim().toLowerCase();
            termLogs.push(username.toLowerCase() + "@andland:~$ " + cmd);
            if (clearCmd === "help") {
                termLogs.push(" Commands: help, neofetch, clear");
            } else if (clearCmd === "neofetch") {
                termLogs.push(" OS: Andland OS " + VERSION);
                termLogs.push(" Architecture: Intel Core i9 Process Grid");
                termLogs.push(" Display Server Protocol: Wayland Server Link Engine");
            } else if (clearCmd === "clear") {
                termLogs = [];
            } else {
                termLogs.push(" Executable process context map not found.");
            }
            termLogs.push("");
        }

        const bootTimer = setInterval(function() {
            if (bootStep < bootLogs.length - 1) { bootStep++; render(); } 
            else { clearInterval(bootTimer); currentPhase = "Locked"; render(); }
        }, 600);

        bgImage.onload = function() { if (currentPhase === "Desktop") render(); };

        window.addEventListener('keydown', function(e) {
            if (!isSystemOn) return;
            if (isChangingWallpaperURL) {
                if (e.key === "Enter") {
                    if (inputBuffer.trim() !== "") { wallpaperURL = inputBuffer.trim(); bgImage.src = wallpaperURL; saveSystemState(); }
                    isChangingWallpaperURL = false; inputBuffer = "";
                } else if (e.key === "Backspace") { inputBuffer = inputBuffer.slice(0, -1); }
                else if (e.key.length === 1) { inputBuffer += e.key; }
                render(); return;
            }
            if (currentPhase !== "Locked" && currentPhase !== "Terminal") {
                const key = e.key.toUpperCase();
                if (key === '1') { currentPhase = "Terminal"; render(); return; }
                if (key === '2') { currentPhase = "Settings"; render(); return; }
                if (key === 'D') { currentPhase = "Desktop"; render(); return; }
            }
            if (currentPhase === "Locked") {
                if (e.key.length === 1) typedPassword += e.key;
                else if (e.key === "Backspace") typedPassword = typedPassword.slice(0, -1);
                else if (e.key === "Enter") {
                    if (typedPassword === correctPassword) { currentPhase = "Desktop"; typedPassword = ""; } 
                    else { typedPassword = ""; loginError = true; }
                }
                render(); return;
            }
            if (currentPhase === "Terminal") {
                if (e.key === "Enter") { executeTerminalCommand(termInput); termInput = ""; } 
                else if (e.key === "Backspace") termInput = termInput.slice(0, -1);
                else if (e.key === "Escape") currentPhase = "Desktop";
                else if (e.key.length === 1) termInput += e.key;
                render(); return;
            }
        });

        canvas.addEventListener('click', function(e) {
            if (currentPhase === "Booting" || !isSystemOn) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            if (currentPhase === "Desktop") {
                icons.forEach(function(icon) {
                    if (mouseX >= icon.x && mouseX <= (icon.x + icon.w) && mouseY >= icon.y && mouseY <= (icon.y + icon.h)) {
                        if(icon.app === "LockToggle") currentPhase = "Locked";
                        else currentPhase = icon.app;
                        render();
                    }
                });
            }
            if (currentPhase === "Settings") {
                if (mouseY >= 290 && mouseY <= 320) {
                    if (mouseX >= 225 && mouseX <= 365) { wallpaperMode = "matrix"; saveSystemState(); render(); }
                    if (mouseX >= 380 && mouseX <= 520) { wallpaperMode = "image"; saveSystemState(); render(); }
                }
                if (mouseX >= 225 && mouseX <= 745 && mouseY >= 340 && mouseY <= 370) {
                    isChangingWallpaperURL = true; inputBuffer = ""; render();
                }
            }
        });

        render();
    </script>
</body>
</html>
